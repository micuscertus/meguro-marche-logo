<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
#ss{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}
#sl{width:68vw;max-width:300px;mix-blend-mode:screen}
#sb{background:#fff;color:#000;border:none;border-radius:50px;font-weight:700;font-size:18px;padding:20px 56px;-webkit-appearance:none;cursor:pointer}
#cs{display:none;position:fixed;inset:0}
#cv{position:absolute;left:0;top:0;width:100%;height:100%}
#controls{position:absolute;bottom:0;left:0;right:0;z-index:30;background:rgba(0,0,0,.6);padding:10px 16px 32px}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.crow:last-child{margin-bottom:0}
.clabel{color:#fff;font-size:11px;width:48px;flex-shrink:0}
input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.3);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:#fff;border-radius:50%}
#sh{position:absolute;bottom:138px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.4);box-shadow:0 0 0 3px #fff,0 0 0 8px rgba(0,0,0,.4);z-index:40;cursor:pointer;-webkit-appearance:none}
#fl{position:absolute;inset:0;z-index:50;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.12s}
#rs{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;align-items:center;justify-content:center}
#ri{width:100%;max-height:74vh;object-fit:contain}
#hint{color:#fff;font-size:15px;margin-top:18px;text-align:center;line-height:1.8;padding:0 24px}
#bb{background:#fff;color:#000;border:none;border-radius:50px;font-weight:700;font-size:16px;padding:16px 48px;margin-top:20px;-webkit-appearance:none;cursor:pointer}
</style>

var SW = 0, SH = 0;
var logoL = 0, logoT = 0, logoW = 0, logoH = 0;
var rafId = null;

function startCam() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
  .then(function(s) {
    v.srcObject = s;
    v.play();
    document.getElementById('ss').style.display = 'none';
    cs.style.display = 'block';
    // ブラウザバーが消えるのを待ってからサイズ確定
    setTimeout(function() {
      SW = window.innerWidth;
      SH = window.innerHeight;
      cv.width  = SW;
      cv.height = SH;
      applySliders();
      startRender();
    }, 600);
  })
  .catch(function() { alert('カメラを許可してください'); });
}

function applySliders() {
  if (!SW || !SH) return;
  var sz = parseInt(document.getElementById('sz').value);
  var px = parseInt(document.getElementById('px').value);
  var py = parseInt(document.getElementById('py').value);
  logoW = SW * sz / 100;
  logoH = logoW * (logoImg.naturalHeight || 1) / (logoImg.naturalWidth || 1);
  logoL = SW * px / 100 - logoW / 2;
  logoT = SH * py / 100 - logoH / 2;
  logoL = Math.max(0, Math.min(SW - logoW, logoL));
  logoT = Math.max(0, Math.min(SH - logoH, logoT));
}

function setLogo(x, y, w) {
  logoW = Math.max(SW * 0.1, Math.min(SW * 0.95, w));
  logoH = logoW * (logoImg.naturalHeight || 1) / (logoImg.naturalWidth || 1);
  logoL = Math.max(0, Math.min(SW - logoW, x));
  logoT = Math.max(0, Math.min(SH - logoH, y));
}

function drawFrame() {
  ctx.drawImage(v, 0, 0, SW, SH);
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.95;
  ctx.drawImage(logoImg, logoL, logoT, logoW, logoH);
  ctx.restore();
}

function startRender() {
  if (rafId) cancelAnimationFrame(rafId);
  function frame() {
    drawFrame();
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}

function stopRender() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// タッチ操作（ドラッグ・ピンチ）をcanvasで受け取る
var drag  = {on:false, sx:0, sy:0, ox:0, oy:0};
var pinch = {on:false, d0:0, w0:0};

function tdist(t) {
  var dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    drag.on = true; pinch.on = false;
    drag.sx = e.touches[0].clientX; drag.sy = e.touches[0].clientY;
    drag.ox = logoL; drag.oy = logoT;
  } else if (e.touches.length === 2) {
    drag.on = false; pinch.on = true;
    pinch.d0 = tdist(e.touches); pinch.w0 = logoW;
  }
}, {passive:false});

cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && drag.on) {
    var nx = drag.ox + (e.touches[0].clientX - drag.sx);
    var ny = drag.oy + (e.touches[0].clientY - drag.sy);
    setLogo(nx, ny, logoW);
  } else if (e.touches.length === 2 && pinch.on) {
    var nw = pinch.w0 * (tdist(e.touches) / pinch.d0);
    var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    setLogo(cx - nw/2, cy - nw * (logoImg.naturalHeight/logoImg.naturalWidth) / 2, nw);
    document.getElementById('sz').value = Math.round(logoW / SW * 100);
  }
}, {passive:false});

cv.addEventListener('touchend', function() { drag.on = false; pinch.on = false; });

function snap() {
  // フラッシュ演出
  fl.style.opacity = '1';
  setTimeout(function() { fl.style.opacity = '0'; }, 120);

  // 最新フレームをcanvasに描画してそのまま保存
  drawFrame();
  done();
}

function done() {
  document.getElementById('ri').src = cv.toDataURL('image/jpeg', 0.95);
  cs.style.display = 'none';
  document.getElementById('rs').style.display = 'flex';
  stopRender();
}

function back() {
  document.getElementById('rs').style.display = 'none';
  cs.style.display = 'block';
  startRender();
}
</script>
